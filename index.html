<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>개역한글 관주성경 검색</title>
    <style>
        /* [식탁 꾸미기] 글자 크기나 색깔을 정해요 */
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f9f9f9; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* 검색창 꾸미기 */
        .search-area { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        button { padding: 12px 20px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; }
        
        /* 결과창 꾸미기 */
        #result-display { border-top: 2px solid #eee; padding-top: 20px; }
        .verse-box { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .address { font-weight: bold; color: #2c3e50; font-size: 18px; }
        .content { margin: 10px 0; font-size: 17px; line-height: 1.6; }
        
        /* [핵심] 관주(연결 링크) 꾸미기 */
        .ref-chip { display: inline-block; background: #e3f2fd; color: #1976d2; padding: 4px 8px; border-radius: 4px; font-size: 14px; margin-right: 5px; cursor: pointer; text-decoration: none; }
        .ref-chip:hover { background: #1976d2; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>📖 관주성경 검색</h2>
    
    <div class="search-area">
        <input type="text" id="userInput" placeholder="구절 주소(창 1:1)나 단어 입력">
        <button onclick="searchStart()">검색</button>
    </div>

    <div id="result-display">
        <p style="color: #666;">검색어를 입력하고 버튼을 눌러주세요.</p>
    </div>
</div>
<script>
    let bibleData = []; // 성경 데이터를 담아둘 바구니

    // [명령 1] 창고(JSON 파일)에서 데이터 가져오기
    fetch('bible_data.json')
        .then(response => response.json())
        .then(data => {
            bibleData = data;
            console.log("데이터 로드 완료!");
        });

    // [명령 2] 검색 실행하기
    function searchStart(query) {
        // 만약 클릭으로 들어온 검색어(query)가 있으면 그걸 쓰고, 없으면 입력창의 글자를 가져옴
        const keyword = query || document.getElementById('userInput').value;
        
        // 입력창 글자도 검색어로 업데이트 (관주 클릭 시 필요)
        document.getElementById('userInput').value = keyword;

        if (!keyword) {
            alert("검색어를 입력하세요!");
            return;
        }

        // 데이터 바구니에서 주소나 본문에 키워드가 포함된 것만 골라내기
        const filtered = bibleData.filter(item => 
            item.address.includes(keyword) || item.content.includes(keyword)
        );

        displayResults(filtered);
    }

    // [명령 3] 결과를 화면(식탁)에 차려내기
    function displayResults(results) {
        const displayArea = document.getElementById('result-display');
        
        if (results.length === 0) {
            displayArea.innerHTML = "<p>검색 결과가 없습니다.</p>";
            return;
        }

        // 결과를 하나씩 HTML 형태로 변환해서 화면에 넣기
        displayArea.innerHTML = results.map(item => `
            <div class="verse-box">
                <div class="address">${item.address}</div>
                <div class="content">${item.content}</div>
                <div class="references">
                    <strong>관주:</strong>
                    ${item.references.map(ref => `
                        <span class="ref-chip" onclick="searchStart('${ref}')">${ref}</span>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
