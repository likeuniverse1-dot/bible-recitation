<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>요한계시록 5장 암송 학습</title>
    <style>
        /* 기본 설정: 글자 크기 20pt */
        body {
            font-size: 20pt;
            font-family: 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        /* 상단 네비게이션 (페이지 이동) */
        .nav-buttons {
            flex: 0 0 auto;
            background: #ffffff;
            padding: 15px;
            border-bottom: 4px solid #4A90E2;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* 횡스크롤 컨테이너 */
        .verse-wrapper {
            flex: 1;
            display: flex;
            flex-direction: row;
            overflow-x: auto; /* 가로 스크롤 활성화 */
            gap: 30px;
            padding: 20px 10px;
            align-items: flex-start;
        }

        /* 각 구절 카드 */
        .verse-card {
            flex: 0 0 750px; /* 카드 너비 고정 */
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            border: 1px solid #e0e0e0;
        }

        .verse-num {
            font-size: 26pt;
            font-weight: bold;
            color: #4A90E2;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        /* 입력 영역 (1페이지용 3줄 입력창 포함) */
        .content-box {
            min-height: 180px;
            margin-bottom: 25px;
            line-height: 1.8;
        }

        textarea {
            width: 100%;
            font-size: 20pt;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            box-sizing: border-box;
            resize: none;
        }

        input[type="text"] {
            font-size: 20pt;
            border: 2px solid #ddd;
            margin: 4px;
            padding: 5px 10px;
            border-radius: 8px;
            text-align: center;
            transition: all 0.3s;
        }

        /* 버튼 디자인 */
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        button {
            font-size: 18pt;
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 10px;
            border: none;
            font-weight: bold;
        }

        .btn-check { background-color: #2ECC71; color: white; }
        .btn-refresh { background-color: #F1C40F; color: #333; }
        .btn-nav { background-color: #4A90E2; color: white; }

        /* 결과 색상 피드백 */
        .correct { background-color: #D5F5E3 !important; border-color: #2ECC71 !important; }
        .incorrect { background-color: #FADBD8 !important; border-color: #E74C3C !important; }
        
        .result-msg {
            margin-top: 15px;
            font-size: 18pt;
            font-weight: bold;
            min-height: 40px;
        }
        .ans-text { color: #E74C3C; display: block; margin-top: 5px; }

        /* 하단 전체 초기화 */
        .footer { flex: 0 0 auto; text-align: center; padding: 20px; }
        .refresh-all { background-color: #95A5A6; color: white; width: 100%; max-width: 500px; }
    </style>
</head>
<body>

    <div class="nav-buttons">
        <button class="btn-nav" onclick="changePage(-1)">이전 페이지</button>
        <button class="btn-nav" onclick="changePage(1)">다음 페이지</button>
        <span id="page-indicator" style="font-weight: bold; font-size: 24pt;"></span>
    </div>

    <div id="content" class="verse-wrapper"></div>

    <div class="footer">
        <button class="refresh-all" onclick="resetAll()">입력 내용 전체 지우기</button>
    </div>

    <script>
        const bibleVerses = [
            "내가 보매 보좌에 앉으신 이의 오른손에 책이 있으니 안팎으로 썼고 일곱 인으로 봉하였더라",
            "또 보매 힘 있는 천사가 큰 음성으로 외치기를 누가 책을 펴며 그 인을 떼기에 합당하냐 하니",
            "하늘 위에나 땅 위에나 땅 아래에 능히 책을 펴거나 보거나 할 이가 없더라",
            "이 책을 펴거나 보거나 하기에 합당한 자가 보이지 않기로 내가 크게 울었더니",
            "장로 중에 하나가 내게 말하되 울지 말라 유대 지파의 사자 다윗의 뿌리가 이기었으니 이 책과 그 일곱 인을 떼시리라 하더라",
            "내가 또 보니 보좌와 네 생물과 장로들 사이에 어린 양이 섰는데 일찍 죽임을 당한것 같더라 일곱 뿔과 일곱 눈이 있으니 이 눈은 온 땅에 보내심을 입은 하나님의 일곱 영이더라",
            "어린 양이 나아와서 보좌에 앉으신 이의 오른손에서 책을 취하시니라",
            "책을 취하시매 네 생물과 이십 사 장로들이 어린 양 앞에 엎드려 각각 거문고와 향이 가득한 금 대접을 가졌으니 이 향은 성도의 기도들이라",
            "새 노래를 노래하여 가로되 책을 가지시고 그 인봉을 떼기에 합당하시도다 일찍 죽임을 당하사 각 족속과 방언과 백성과 나라 가운데서 사람들을 피로 사서 하나님께 드리시고",
            "저희로 우리 하나님 앞에서 나라와 제사장을 삼으셨으니 저희가 땅에서 왕노릇하리로다 하더라",
            "내가 또 보고 들으매 보좌와 생물들과 장로들을 둘러 선 많은 천사의 음성이 있으니 그 수가 만만이요 천천이라",
            "큰 음성으로 가로되 죽임을 당하신 어린 양이 능력과 부와 지혜와 힘과 존귀와 영광과 찬송을 받으시기에 합당하도다 하더라",
            "내가 또 들으니 하늘 위에와 땅 위에와 땅 아래와 바다 위에와 또 그 가운데 모든 만물이 가로되 보좌에 앉으신 이와 어린 양에게 찬송과 존귀와 영광과 능력을 세세토록 돌릴찌어다 하니",
            "네 생물이 가로되 아멘 하고 장로들은 엎드려 경배하더라"
        ];

        let currentPage = 1;

        // 문장부호 및 공백 제거 함수 (정답 체크용)
        function clean(text) {
            return text.replace(/[.,\s{}[]()!@#$%^&]/g, "");
        }

        // 실질적인 단어인지 체크 (문장부호만 있는 경우 제외)
        function isRealWord(word) {
            return word.replace(/[.,{}[]()!@#$%^&]/g, "").length > 0;
        }

        function render() {
            const container = document.getElementById('content');
            container.innerHTML = '';
            const indicator = document.getElementById('page-indicator');
            
            const titles = ["", "1페이지: 전체 암송", "2페이지: 홀수 단어 채우기", "3페이지: 짝수 단어 채우기"];
            indicator.innerText = titles[currentPage];

            bibleVerses.forEach((verse, vIdx) => {
                const card = document.createElement('div');
                card.className = 'verse-card';

                let html = `<div class="verse-num">${vIdx + 1}절</div>`;
                html += `<div class="content-box">`;

                if (currentPage === 1) {
                    // 전체 암송: 3줄 textarea
                    html += `<textarea id="input-${vIdx}" rows="3" placeholder="구절을 입력하세요"></textarea>`;
                } else {
                    // 단어 채우기
                    const words = verse.split(' ');
                    let realCount = 0;
                    words.forEach((word, wIdx) => {
                        if (isRealWord(word)) {
                            realCount++;
                            const isOdd = realCount % 2 !== 0;
                            const isTarget = (currentPage === 2 && isOdd) || (currentPage === 3 && !isOdd);
                            
                            if (isTarget) {
                                html += `<input type="text" id="input-${vIdx}-${wIdx}" data-answer="${word}" style="width: ${word.length * 35}px;"> `;
                            } else {
                                html += `<span>${word} </span>`;
                            }
                        } else {
                            html += `<span>${word} </span>`;
                        }
                    });
                }
                html += `</div>`;

                // 버튼 그룹을 구절 아래에 배치
                html += `
                    <div class="btn-group">
                        <button class="btn-check" onclick="check(${vIdx})">정답 확인</button>
                        <button class="btn-refresh" onclick="resetOne(${vIdx})">새로고침</button>
                    </div>
                    <div id="result-${vIdx}" class="result-msg"></div>
                `;

                card.innerHTML = html;
                container.appendChild(card);
            });
        }

        function check(vIdx) {
            const resultDiv = document.getElementById(`result-${vIdx}`);
            resultDiv.innerHTML = '';

            if (currentPage === 1) {
                const input = document.getElementById(`input-${vIdx}`);
                if (clean(input.value) === clean(bibleVerses[vIdx])) {
                    input.className = 'correct';
                    resultDiv.innerHTML = '<span style="color:#2ECC71">정답입니다! ✨</span>';
                } else {
                    input.className = 'incorrect';
                    resultDiv.innerHTML = `<span class="ans-text">정답: ${bibleVerses[vIdx]}</span>`;
                }
            } else {
                const inputs = document.querySelectorAll(`[id^="input-${vIdx}-"]`);
                let allCorrect = true;
                inputs.forEach(input => {
                    if (clean(input.value) === clean(input.dataset.answer)) {
                        input.className = 'correct';
                    } else {
                        input.className = 'incorrect';
                        allCorrect = false;
                        const hint = document.createElement('div');
                        hint.style.fontSize = '14pt';
                        hint.style.color = '#E74C3C';
                        hint.innerText = input.dataset.answer;
                        input.after(hint);
                    }
                });
                if (allCorrect) resultDiv.innerHTML = '<span style="color:#2ECC71">정답입니다! ✨</span>';
            }
        }

        function resetOne(vIdx) {
            render(); // 간단하게 해당 페이지만 다시 그려 초기화
        }

        function changePage(dir) {
            currentPage += dir;
            if (currentPage < 1) currentPage = 1;
            if (currentPage > 3) currentPage = 3;
            render();
        }

        function resetAll() {
            if(confirm("모든 입력 내용을 초기화하시겠습니까?")) render();
        }

        render(); // 초기 실행
    </script>
</body>
</html>
